[project]
name = "data-designer-engine"
dynamic = ["version", "dependencies"]
description = "Generation engine for DataDesigner synthetic data generation"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"

classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]

[build-system]
requires = ["hatchling", "uv-dynamic-versioning>=0.7.0"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
bump = true

[tool.hatch.metadata.hooks.uv-dynamic-versioning]
dependencies = [
    "anyascii>=0.3.3,<1",
    "chardet>=3.0.2,<6",  # Pulled in by sqlfluff
    "cryptography>=46.0.7,<47", # 46.0.7 fixes CVE-2026-39892 pulled in by mcp
    "data-designer-config=={{ version }}",
    "duckdb>=1.5.0,<2",
    "faker>=20.1.0,<21",
    "fsspec>=2025.3.0,<2026",
    "httpx>=0.27.2,<1",
    "httpx-retries>=0.4.2,<1",
    "huggingface-hub>=1.0.1,<2",
    "json-repair>=0.48.0,<1",
    "jsonpath-rust-bindings>=1.0,<2",
    "jsonschema>=4.0.0,<5",
    "lxml>=6.1.0,<7",
    "marko>=2.1.2,<3",
    "mcp>=1.26.0,<2",
    "networkx>=3.0,<4",
    "numpy>=1.23.5,<3",
    "pydantic>=2.9.2,<3",
    "pyjwt[crypto]>=2.13.0,<3", # 2.13.0 fixes PyJWT security advisories pulled in by mcp
    "python-multipart>=0.0.29,<1", # 0.0.29 addresses multipart security advisories pulled in by mcp
    "ruff>=0.14.10,<1",
    "scipy>=1.11.0,<2",
    "sqlfluff>=4.1.0,<5",
    "starlette>=1.2.0,<2", # 1.2.0 fixes security advisory pulled in by mcp
    "tiktoken>=0.8.0,<1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/data_designer"]

[tool.ruff]
extend = "../../pyproject.toml"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_default_fixture_loop_scope = "session"
env = ["DISABLE_DATA_DESIGNER_PLUGINS=true"]

[tool.uv]
package = true

[tool.uv.sources]
data-designer-config = { workspace = true }
